<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Card</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: hsl(212, 45%, 89%);
      }

      .card {
        width: 300px;
        background: white;
        padding: 16px;
        border-radius: 18px;
        text-align: center;
        box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.08);
      }

      .card img {
        width: 100%;
        border-radius: 12px;
      }

      .card h2 {
        font-size: 20px;
        color: hsl(218, 44%, 22%);
        margin: 20px 0 15px;
        font-weight: bold;
      }

      .card p {
        font-size: 15px;
        color: hsl(220, 15%, 55%);
        line-height: 1.5;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        src="https://tse1.explicit.bing.net/th/id/OIP.28IWve1Pqv7o7-ZusPN9iwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
        alt="QR Code"
      />
      <h2>Improve your front-end skills by building projects</h2>
      <p>
        Scan the QR code to visit Frontend Mentor and take your coding skills to
        the next level
      </p>
    </div>
  </body>
</html>
